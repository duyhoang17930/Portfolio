name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Frontend
      - name: Setup Node.js for FE
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: FE/package-lock.json

      - name: Install FE dependencies
        working-directory: FE
        run: npm ci

      - name: Build FE
        working-directory: FE
        run: npm run build

      # Backend
      - name: Setup Node.js for BE
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: BE/package-lock.json

      - name: Install BE dependencies
        working-directory: BE
        run: npm ci

      - name: Build BE
        working-directory: BE
        run: npm run build
